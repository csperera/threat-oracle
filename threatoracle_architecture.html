<script>
var info = {
  ingestion: {
    title: "Knowledge Base Ingestion (one-time setup)",
    body: `IN: Three MITRE open-source knowledge bases — all Apache 2.0 licensed
OUT: ChromaDB vector index + D3FEND JSON lookup table + ATLAS corpus (V2)

SOURCE 1 — MITRE ATT&CK (ingestion/attck_ingestion.py):
Downloads enterprise-attack STIX bundle from github.com/mitre/cti (~12MB)
Parses 600+ active techniques — skips deprecated and revoked entries
Chunks one technique per document:
  technique ID, name, tactic, description (1500 chars), detection (800 chars)
  platforms, is_subtechnique flag, parent_id, source URL
Embeds via Google Gemini (models/gemini-embedding-001)
  task_type="retrieval_document" · batches of 50 · 65-second rate limit pause
Stores in ChromaDB PersistentClient at data/chroma_db/
  collection: attck_techniques · cosine similarity · technique IDs as document IDs
Full technique metadata saved as flat JSON at data/attck/technique_lookup.json

SOURCE 2 — MITRE D3FEND (ingestion/d3fend_parser.py):
Queries live D3FEND API per ATT&CK technique ID:
  https://d3fend.mitre.org/api/offensive-technique/attack/{id}.json
Extracts countermeasure name and D3FEND ID from API bindings
Infers category from name keywords: Prevent, Detect, Respond, Other
Sorts by priority: Prevent → Detect → Respond → Other
Saves as flat JSON lookup at data/d3fend/d3fend_lookup.json keyed by technique ID
Progress saved every 25 techniques — resilient to API interruptions
NOT embedded — pure key lookup at query time
0.3 second polite delay between API calls

SOURCE 3 — MITRE ATLAS (V2 planned):
github.com/mitre-atlas/atlas-data · ML-specific attack techniques
Adversarial ML · prompt injection · model poisoning · training data corruption

Key design decision — ATT&CK embedded, D3FEND as lookup:
ATT&CK is a semantic search problem — technique descriptions need vector search
D3FEND is a graph relationship problem — technique ID maps to countermeasures
Two different data structures for two fundamentally different retrieval patterns`
  },
  input: {
    title: "Input Layer — Three Accepted Formats",
    body: `IN: Any of three input formats — all accepted interchangeably
OUT: Raw input string passed to Normalization Agent

FORMAT 1 — Raw log snippets:
Network traffic logs, authentication logs, system event logs
Example:
"02:14:33 - Host 192.168.1.45 attempting SSH connections to 47 internal hosts
 in 3 minutes. Multiple failed authentication attempts observed."

FORMAT 2 — Plain English description:
Analyst describing suspicious behaviour in natural language
Example:
"We are seeing unusual outbound traffic to a known Tor exit node with 2.3GB
 of data transferred in under 3 minutes from host 192.168.1.103."

FORMAT 3 — Structured JSON from AegisAI or SIEM:
{
  "attack_type": "BruteForce",
  "confidence": 0.97,
  "src_ip": "192.168.1.45",
  "dst_port": 22,
  "timestamp": "2026-06-27T02:14:33Z"
}

ThreatOracle is Component 2 of the AI SOC pipeline.
It accepts AegisAI JSON output directly — the two systems are loosely coupled
via the ThreatEvent JSON schema. Neither system depends on the other's internals.

UI entry points:
Streamlit frontend: demo scenario dropdown + log paste text area + Analyze button
FastAPI backend: POST /analyze accepts raw_input + input_format`
  },
  stage1: {
    title: "Stage 1 — Normalization Agent (LLM)",
    body: `agents/normalization_agent.py

IN: Raw input string — any of the three formats
OUT: Standardized security JSON regardless of input format

How it works:
LLM call with structured system prompt containing:
  Role: "You are a cybersecurity analyst extracting structured security features
  from arbitrary input"
  Explicit examples of each input format and expected JSON output
  JSON-only instruction — no explanation, no markdown, raw JSON only

LLM extracts security-relevant features regardless of input format:
  source IP addresses · destination IPs and ports · protocol
  behaviour patterns · timing information · data volume
  attack indicators · affected hosts

Pydantic validation on output:
  Optional fields throughout — partial extraction always better than failure
  If a field is not in the input → leave it null, do not hallucinate

Example output (from SSH brute force log):
{
  "behaviours": [
    {
      "description": "Rapid SSH connections to 47 internal hosts",
      "source_ip": "192.168.1.45",
      "protocol": "SSH",
      "pattern": "scanning",
      "volume": "47 hosts in 3 minutes"
    }
  ],
  "external_connections": ["185.220.101.x"],
  "data_transfer": "2.3GB outbound",
  "affected_hosts": ["192.168.1.45", "192.168.1.103"]
}

Key design decision:
The normalization stage is the secret sauce — it handles the diversity of
real-world log formats without requiring users to pre-format their input.
An analyst can paste raw Splunk output, a plain English description, or
AegisAI JSON and get the same quality of diagnosis.`
  },
  stage2: {
    title: "Stage 2 — Hybrid RAG Retrieval + D3FEND Lookup",
    body: `retrieval/hybrid_search.py + retrieval/d3fend_lookup.py

IN: Standardized security JSON from Normalization Agent
OUT: Top ATT&CK technique matches with confidence scores + D3FEND countermeasures

STEP 2a — HYBRID SEARCH (retrieval/hybrid_search.py):
Each behaviour in the normalized JSON becomes a separate query.

Dense search:
  Embed behaviour description using Gemini models/gemini-embedding-001
  ChromaDB cosine similarity search across 600+ ATT&CK technique embeddings
  Returns ranked list A — semantically similar techniques

Sparse search:
  BM25 keyword matching on technique names and descriptions
  Returns ranked list B — keyword-matched techniques

RRF Fusion:
  Merge ranked lists A and B by position, not score
  Position-based merging prevents either method from dominating
  A technique ranked #2 in both lists beats one ranked #1 in only one list

Confidence threshold filter:
  Only techniques with confidence >= 0.70 surface in results
  Below threshold = not confident enough to report to analyst

Why hybrid and not pure vector search:
  "SSH brute force" needs both semantic understanding AND keyword match
  Pure vector search misses exact names like "T1110" or "Password Spraying"
  Pure BM25 misses semantic variants — "credential stuffing" vs "password attack"
  Hybrid with RRF gets both signals simultaneously

STEP 2b — D3FEND LOOKUP (retrieval/d3fend_lookup.py):
Takes top ATT&CK technique IDs from hybrid search
Direct key lookup in data/d3fend/d3fend_lookup.json — NOT semantic search
Returns all countermeasures mapped to each technique
Pre-sorted: Prevent → Detect → Respond → Other
Each countermeasure: D3FEND ID · name · category · URL`
  },
  stage3: {
    title: "Stage 3 — Synthesis Agent (LLM)",
    body: `agents/synthesis_agent.py

IN: All retrieval results — ranked techniques + evidence + D3FEND countermeasures
OUT: Complete structured analyst report — six sections

How it works:
LLM call (Claude Sonnet) with all retrieval results injected as context.

Grounding constraints enforced in system prompt:
  Every claim must be traceable to retrieved ATT&CK or D3FEND content
  Always cite technique IDs (e.g. T1110, T1021.004)
  No hallucination — if not in retrieved context, do not state it

Report structure — six sections:

1. EXECUTIVE SUMMARY (boardroom ready, 2-3 sentences):
   "Our systems have detected a successful brute force attack against internal
    SSH services, leading to the compromise of host 192.168.1.103..."

2. DETECTED TECHNIQUES (ranked by confidence):
   T1110.003 — Password Spraying (91%) · Tactic: Credential Access
   Evidence: Multiple failed SSH authentication attempts observed

3. D3FEND COUNTERMEASURES per technique (Prevent → Detect → Respond):
   D3-ALO Account Lockout [Prevent]
   D3-MFA Multi-Factor Authentication [Prevent]
   D3-SPP Strong Password Policy [Prevent]

4. NETWORK INDICATORS:
   Source IPs · Internal targets · External/C2 connections · Timeline · Volume

5. RECOMMENDED IMMEDIATE ACTIONS (specific, with D3FEND codes):
   "1. Isolate host 192.168.1.103 from network immediately"
   "2. Block outbound to 185.220.101.x (D3-NTF Network Traffic Filter)"

6. ATTACK CHAIN ASSESSMENT (narrative connecting all techniques):
   "The attack began with SSH brute force (T1110), achieving lateral movement
    via SSH (T1021.004), followed by C2 via Tor (T1090.003) and exfiltration"

Why Claude Sonnet for synthesis:
Compliance-grade language precision required
Structured six-section output enforced via prompt schema
ATT&CK technique ID citation is non-negotiable — cannot be skipped`
  },
  output: {
    title: "Output Layer — Three-Tab Report",
    body: `IN: Complete analyst report from Synthesis Agent
OUT: Three-tab display in Streamlit + green confirmation bar

TAB 1 — ANALYST REPORT:
Full formatted diagnosis — all six sections rendered in Streamlit markdown
Copyable — paste directly into incident report or ticketing system
Executive summary at top — boardroom ready without further editing
The deliverable that replaces 45 minutes of manual MITRE navigation

TAB 2 — TECHNIQUES:
All detected techniques ranked by confidence score
Full ATT&CK detail per technique:
  Tactic, description, detection guidance, evidence from the input
D3FEND countermeasures per technique:
  Prevent, Detect, and Respond countermeasures clearly categorized
  Each countermeasure linked to D3FEND ID for reference

TAB 3 — NORMALIZED JSON:
Shows exactly what the Normalization Agent extracted from the raw input
Transparency into the normalization step — analyst verifies extraction accuracy
Useful for debugging when a technique seems unexpected
Shows the exact queries that drove the retrieval in Stage 2

GREEN CONFIRMATION BAR:
Displays below Analyze button on pipeline completion
"Done — N techniques identified"
End-to-end time target: under 30 seconds
Manual equivalent: 45 minutes of ATT&CK + D3FEND cross-referencing

The confirmation bar is the signal that the pipeline ran clean.
N techniques identified = the system found meaningful signal in the input.`
  }
};

function showInfo(key) {
  document.getElementById("modal-title").textContent = info[key].title;
  document.getElementById("modal-body").textContent = info[key].body;
  document.getElementById("modal-overlay").style.display = "block";
}

function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
}
</script>
